name: Fetch Ozonetel CDR

on:
  schedule:
    # Pipeline ② — :08 UTC every hour, right after Tata fetch (:00). Previous full IST hour (--ist-previous-hour).
    # See fetch_calls.yml, analyze_calls.yml (analyze at :25 on */3 hours only).
    - cron: "8 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "previous-hour (hourly default) | full-day (today+yesterday) | custom date"
        required: true
        default: "previous-hour"
        type: choice
        options:
          - previous-hour
          - full-day
          - custom-date
      date:
        description: "YYYY-MM-DD when mode is custom-date"
        required: false

jobs:
  fetch-ozonetel:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Fetch Ozonetel CDR
        env:
          OZONETEL_API_KEY: ${{ secrets.OZONETEL_API_KEY }}
          OZONETEL_USERNAME: ${{ secrets.OZONETEL_USERNAME }}
          # Optional; script defaults to in1-ccaas-api.ozonetel.com if unset/empty
          OZONETEL_DOMAIN: ${{ secrets.OZONETEL_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="previous-hour"; fi
          if [ "$MODE" = "full-day" ]; then
            python scripts/fetch_ozonetel_calls.py --days 1
          elif [ "$MODE" = "custom-date" ] && [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/fetch_ozonetel_calls.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/fetch_ozonetel_calls.py --ist-previous-hour
          fi
