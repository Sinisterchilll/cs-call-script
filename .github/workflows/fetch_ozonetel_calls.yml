name: Fetch Ozonetel CDR

on:
  schedule:
    # Hourly: full calendar day via fetchCDRDetails (Asia/Kolkata date), insert new UCIDs only
    - cron: "8 * * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD to fetch (full day 00:00–23:59 in API body). Leave empty for today (Asia/Kolkata)."
        required: false
        type: string

jobs:
  fetch-ozonetel:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Fetch Ozonetel CDR
        env:
          OZONETEL_API_KEY: ${{ secrets.OZONETEL_API_KEY }}
          OZONETEL_USERNAME: ${{ secrets.OZONETEL_USERNAME }}
          OZONETEL_DOMAIN: ${{ secrets.OZONETEL_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          RUN_DATE="${{ github.event.inputs.date }}"
          if [ -z "${RUN_DATE:-}" ]; then
            RUN_DATE=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          fi
          echo "Ozonetel: full day $RUN_DATE — fetchCDRDetails + insert missing UCIDs"
          python scripts/fetch_ozonetel_calls.py --date "$RUN_DATE" --no-incremental --via-details
