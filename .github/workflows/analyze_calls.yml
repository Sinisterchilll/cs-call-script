name: Transcribe Calls

on:
  schedule:
    # Pipeline ③ — transcription only. Runs after Ozonetel fetch at :08.
    # OpenAI analysis is handled by analyze_transcripts.yml on offset hours.
    - cron: "25 */3 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Specific date (YYYY-MM-DD), leave empty for all pending"
        required: false
      limit:
        description: "Max calls to process (for testing)"
        required: false
      from_date:
        description: "Backfill from this date onwards (YYYY-MM-DD). Leave empty to process yesterday + today only."
        required: false
      transcriber:
        description: "Transcriber to use"
        required: false
        default: "elevenlabs"
        type: choice
        options:
          - elevenlabs
          - deepgram

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: transcribe-calls
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests psycopg2-binary elevenlabs

      - name: Transcribe calls
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TRANSCRIBER: ${{ github.event.inputs.transcriber || secrets.TRANSCRIBER || 'elevenlabs' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            ARGS="$ARGS --from-date ${{ github.event.inputs.from_date }}"
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          ARGS="$ARGS --transcribe-only"
          python scripts/analyze_calls.py $ARGS
